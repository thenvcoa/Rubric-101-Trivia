  ============================================================================
  LIVE TRAINING TRIVIA — setup guide
  ============================================================================
  1. Edit the CONFIG object below (search for "EDIT ME") — set your title,
     intro copy, and your 10-15 questions. Each question can use a Google
     Drive video, a YouTube video, an mp4 url, or no video at all.

     Google Drive: file must be shared as "Anyone with the link -> Viewer".
     Grab the file ID from the share link:
       https://drive.google.com/file/d/FILE_ID_HERE/view  ->  videoId: "FILE_ID_HERE"

     YouTube: grab the ID from the watch url:
       https://www.youtube.com/watch?v=VIDEO_ID_HERE  ->  videoId: "VIDEO_ID_HERE"

  2. Publish/Share this artifact to get a public link.
  3. Open that link yourself -> choose "Host this session" -> project it.
     The lobby screen shows a QR code that encodes the published link — have
     people scan it with their phones to join.
  4. Walk through: Start Game -> (video, if any) -> Start Timer -> question
     is live -> auto-reveals when time is up -> Next Question... -> Final
     Results.
  ============================================================================
-->

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };

<style>
  :root{
    --ink:#12141c;
    --surface:#1b1e29;
    --surface2:#242838;
    --surface3:#2e3244;
    --amber:#ffb627;
    --amber-dim:#8a641c;
    --coral:#ff5d5d;
    --teal:#2de0c2;
    --violet:#8c7cff;
    --green:#3ddc84;
    --text:#f4f2ed;
    --text-dim:#9aa0b4;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:radial-gradient(ellipse at top, #1a1e2c 0%, var(--ink) 60%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  #app{flex:1;display:flex;flex-direction:column;min-height:100vh;}
  .screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .eyebrow{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:10px;}
  .brand-logo{display:block;margin:0 auto 18px;object-fit:contain;}
  .brand-logo.lg{max-height:120px;max-width:300px;}
  .brand-logo.md{max-height:80px;max-width:220px;}
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:16px;
    background:var(--amber);color:#1b1200;border:none;border-radius:14px;
    padding:14px 28px;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 6px 0 var(--amber-dim);
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--amber-dim);}
  .btn.secondary{background:var(--surface3);color:var(--text);box-shadow:0 6px 0 #171a24;}
  .btn.ghost{background:transparent;color:var(--text-dim);box-shadow:none;border:1px solid var(--surface3);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  input[type=text]{
    font-family:'Inter',sans-serif;font-size:18px;padding:14px 18px;border-radius:12px;
    border:2px solid var(--surface3);background:var(--surface2);color:var(--text);
    outline:none;text-align:center;width:100%;max-width:320px;
  }
  input[type=text]:focus{border-color:var(--teal);}
  .nickname-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:560px;margin:0 auto;}
  .nickname-chip{background:var(--surface2);border:2px solid var(--surface3);color:var(--text);border-radius:999px;padding:10px 18px;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:transform .12s ease, border-color .12s ease;}
  .nickname-chip:hover{border-color:var(--teal);transform:translateY(-2px);}
  .nickname-chip:active{transform:translateY(0);}
  .card{background:var(--surface);border-radius:var(--radius);padding:32px;max-width:560px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.35);}
  .stack{display:flex;flex-direction:column;gap:14px;align-items:center;}
  .row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .muted{color:var(--text-dim);font-size:14px;}
  a.linklike{color:var(--teal);}

  /* Role picker */
  .role-card{cursor:pointer;transition:transform .15s ease, border-color .15s ease;border:2px solid var(--surface3);}
  .role-card:hover{transform:translateY(-4px);border-color:var(--teal);}

  /* Lobby */
  #qr-box{background:#fff;padding:14px;border-radius:16px;display:inline-block;}
  .join-url-box{background:var(--surface2);border:2px solid var(--surface3);border-radius:12px;padding:14px 22px;font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;color:var(--teal);margin:10px auto 0;max-width:560px;word-break:break-all;user-select:all;cursor:text;}
  .player-chip{background:var(--surface2);border-radius:999px;padding:8px 16px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;}
  .avatar{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#12141c;flex-shrink:0;}
  .player-wrap{max-width:800px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:18px;}

  /* Timer ring */
  .ring-wrap{position:relative;width:150px;height:150px;margin:0 auto;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--surface3);stroke-width:10;}
  .ring-fg{fill:none;stroke:var(--amber);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .25s linear, stroke .3s ease;}
  .ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:700;font-family:'Space Grotesk',sans-serif;}

  /* Choice tiles */
  .choices{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;width:100%;max-width:720px;margin-top:22px;}
  .choices.count-2{grid-template-columns:1fr 1fr;max-width:520px;}
  .choices.count-3{grid-template-columns:1fr 1fr 1fr;max-width:720px;}
  .choice-tile{
    border-radius:16px;padding:22px 16px;font-size:17px;font-weight:600;color:#0d0d10;
    cursor:pointer;border:none;text-align:left;display:flex;align-items:center;gap:12px;
    transition:transform .1s ease, filter .1s ease;min-height:76px;
  }
  .choice-tile:hover{filter:brightness(1.08);}
  .choice-tile:active{transform:scale(.97);}
  .choice-tile:disabled{opacity:.55;cursor:default;transform:none;}
  .choice-tile.c0{background:var(--teal);}
  .choice-tile.c1{background:var(--amber);}
  .choice-tile.c2{background:var(--violet);color:#fff;}
  .choice-tile.c3{background:var(--coral);color:#fff;}
  .choice-tile.c4{background:var(--green);}
  .choice-tile.c5{background:#5aa9ff;color:#fff;}
  .shape{width:26px;height:26px;flex-shrink:0;}
  .choice-tile.selected{outline:4px solid #fff;}
  .choice-tile.correct-reveal{outline:4px solid var(--green);}
  .choice-tile.wrong-reveal{opacity:.35;}

  /* Multi-select checkbox indicator */
  .check-box{width:22px;height:22px;border-radius:6px;border:2px solid rgba(0,0,0,.35);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.35);}
  .choice-tile.multi-picked .check-box{background:#fff;}
  .choice-tile.multi-picked .check-box:after{content:"✓";font-size:14px;font-weight:800;color:#12141c;}

  /* Ordering UI */
  .order-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:520px;margin-top:22px;}
  .order-item{
    display:flex;align-items:center;gap:12px;background:var(--surface2);border:2px solid var(--surface3);
    border-radius:14px;padding:14px 16px;text-align:left;
  }
  .order-num{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--teal);width:24px;flex-shrink:0;}
  .order-label{flex:1;font-weight:600;}
  .order-arrows{display:flex;flex-direction:column;gap:4px;}
  .order-arrows button{
    background:var(--surface3);border:none;color:var(--text);width:32px;height:26px;border-radius:6px;
    cursor:pointer;font-size:13px;line-height:1;
  }
  .order-arrows button:disabled{opacity:.3;cursor:default;}
  .order-correct-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:480px;margin-top:14px;text-align:left;}
  .order-correct-list div{background:var(--surface2);border-radius:10px;padding:10px 14px;}

  /* Answer explanation modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(9,11,17,.86);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px;animation:fadeIn .2s ease;}
  .modal-card{background:var(--surface);border-radius:22px;padding:34px;max-width:760px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 90px rgba(0,0,0,.55);text-align:center;border:1px solid var(--surface3);}
  .modal-explanation{color:var(--text);font-size:17px;line-height:1.6;max-width:620px;margin:14px auto 0;text-align:left;}
  .modal-card .video-wrap, .modal-card .video-open-card{margin:20px auto 0;}

  /* Presenter console */
  .console-wrap{width:100%;max-width:820px;margin:0 auto;text-align:left;padding:20px 20px 40px;}

// ---------- storage helpers ----------
// These talk to a small Google Apps Script backend instead of Claude's
// built-in artifact storage, so players never need a Claude account to
// join. See APPS_SCRIPT_URL near the top of this file for setup.
function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
async function sGet(key){
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=get&key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if(!data || data.value == null || data.value === '') return null;
    try{ return JSON.parse(data.value); } catch(e){ return data.value; }
  } catch(e){ return null; }
}
async function sSet(key, value, attempt){
  attempt = attempt || 0;
  try{
    const url = `${APPS_SCRIPT_URL}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(JSON.stringify(value))}`;
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.ok) return data;
    throw new Error((data && data.error) ? data.error : 'unknown error');
  } catch(e){
    if(attempt < 2){
      await sleep(300 * (attempt + 1));
      return sSet(key, value, attempt + 1);
    }
    console.error('storage set failed after retries', key, e);
    return null;
  }
}
async function sList(prefix){
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=list&prefix=${encodeURIComponent(prefix)}`);
    const data = await res.json();
    return (data && data.keys) ? data.keys : [];
  } catch(e){ return []; }
}
async function sDelete(key){
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=delete&key=${encodeURIComponent(key)}`);
    return await res.json();
  } catch(e){ return null; }
}

const STATE_KEY = 'game:state';
async function saveGameState(st){
  const result = await sSet(STATE_KEY, st);
  if(!result){ showBanner('Could not save — the game may be out of sync. Check your connection and try that action again.'); }
  return result;
}

}

function shuffleArrayCopy(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }

}

  let queue = [];
  return function next(){
    if(queue.length === 0){ queue = shuffleArrayCopy(messages); }

const DEFAULT_STATE = {
  screen: 'lobby',       // lobby | intro | video | question | reveal | leaderboard | final | closed
  qIndex: 0,
  questionStartAt: 0,
  paused: false,
  pausedRemainingMs: null,
  showAnswer: false,     // true = "Show Answer" popup should be visible on Host + Player screens
  videoPlayToken: 0,     // incremented to remote-trigger video playback on the Host screen (youtube/mp4 only)
  updatedAt: Date.now()
};

let myRole = null;         // 'host' | 'player' | 'console'
let myPlayerId = null;
let myNickname = null;
let pollTimer = null;
let tickTimer = null;
let localState = null;     // last known shared game:state
let submittedForQ = null;  // question id already answered locally, to avoid double submit

const root = document.getElementById('app');

function render(html){ root.innerHTML = html; }

function showBanner(msg, isPersistent){
  let b = document.getElementById('errBanner');
  if(!b){
    b = document.createElement('div');
    b.id = 'errBanner';
    b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff5d5d;color:#fff;padding:12px 16px;text-align:center;font-weight:600;z-index:2000;font-family:Inter,sans-serif;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.3);';
    document.body.appendChild(b);
  }
  b.textContent = msg;
  if(!isPersistent){
    setTimeout(()=>{ const el = document.getElementById('errBanner'); if(el) el.remove(); }, 6000);
  }
}
function showConfirm(message, onConfirm){
  const existing = document.getElementById('confirmModal');
  if(existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'confirmModal';
  overlay.innerHTML = `
    <div class="modal-card" style="max-width:420px;">
      <h2 style="margin:0 0 20px;">${escapeHtml(message)}</h2>
      <div class="row">
        <button class="btn secondary" id="confirmCancelBtn">Cancel</button>
        <button class="btn" id="confirmYesBtn">Yes, continue</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('confirmCancelBtn').onclick = function(){ overlay.remove(); };
  document.getElementById('confirmYesBtn').onclick = function(){ overlay.remove(); onConfirm(); };
}

// ---------- boot / routing ----------
function boot(){
  if(!APPS_SCRIPT_URL || !APPS_SCRIPT_URL.trim()){
    showBanner('⚠️ Setup needed: paste your deployed Apps Script URL into APPS_SCRIPT_URL near the top of the code (see Code.gs for setup steps), then republish.', true);
  }
  const isPlayerLink = location.hash.includes('play');
  if(isPlayerLink){
    myRole = 'player';
    renderJoinForm();
  } else {
    renderRolePicker();
  }
}

function renderRolePicker(){
  render(`
    <div class="screen">
      <img class="brand-logo lg" src="${LOGO_DATA_URI}" alt="logo">
      <div class="eyebrow">${escapeHtml(CONFIG.title)}</div>
      <h1 style="font-size:32px;margin:0 0 24px;">Join as...</h1>
      <div class="row">
        <div class="card role-card" style="width:220px;" onclick="chooseRole('player')">
          <div style="font-size:40px;">📱</div>
          <h3 style="margin:10px 0 4px;">Player</h3>
          <div class="muted">Answer from your phone</div>
        </div>
        <div class="card role-card" style="width:220px;" onclick="chooseRole('host')">
          <div style="font-size:40px;">🖥️</div>
          <h3 style="margin:10px 0 4px;">Host this session</h3>

function shuffleArray(arr){

}

window.answerMulti = async function(qId){
  if(submittedForQ === qId) return;
  if(multiPending.size === 0) return;
  submittedForQ = qId;
  document.querySelectorAll('.choice-tile').forEach(el=>el.disabled=true);
  const btn = document.getElementById('multiSubmitBtn'); if(btn) btn.disabled = true;
  const st = localState;
  const q = CONFIG.questions.find(x=>x.id===qId);
  const elapsed = Date.now() - (st.questionStartAt || Date.now());
  const limitMs = q.timeLimit*1000;
  const chosen = Array.from(multiPending).sort((a,b)=>a-b);
  const correctSet = [...q.correctIndexes].sort((a,b)=>a-b);
  const correct = chosen.length === correctSet.length && chosen.every((v,idx)=>v===correctSet[idx]);
  let points = 0;
  if(correct){ const frac = Math.max(0, 1 - elapsed/limitMs); points = Math.round(500+500*frac); }
  const rec = await sGet('player:'+myPlayerId);
  const data = rec || {id:myPlayerId, nickname:myNickname, score:0, answers:{}};
  data.answers[qId] = {choiceIndexes: chosen, correct, points, elapsedMs: elapsed};
  data.score = Object.values(data.answers).reduce((a,b)=>a+(b.points||0),0);
  await sSet('player:'+myPlayerId, data);
  const msgEl = document.getElementById('playerStatusMsg');
  if(msgEl) msgEl.textContent = "Answer locked in — waiting on others...";
};
function renderPlayerQuestionOrder(q, state, already){

            </div>

window.moveOrderItem = function(pos, dir){
  const target = pos+dir;
  if(target<0 || target>=orderPending.length) return;
  const tmp = orderPending[pos]; orderPending[pos]=orderPending[target]; orderPending[target]=tmp;
  const q = CONFIG.questions[localState.qIndex];
  renderPlayerQuestionOrder(q, localState, submittedForQ===q.id);
};
window.answerOrder = async function(qId){
  if(submittedForQ === qId) return;
  submittedForQ = qId;
  document.querySelectorAll('.order-arrows button').forEach(b=>b.disabled=true);
  const btn = document.getElementById('orderSubmitBtn'); if(btn) btn.disabled = true;
  const st = localState;
  const q = CONFIG.questions.find(x=>x.id===qId);
  const elapsed = Date.now() - (st.questionStartAt || Date.now());
  const limitMs = q.timeLimit*1000;
  const submitted = orderPending.slice();
  let matches = 0;
  for(let i=0;i<q.correctOrder.length;i++){ if(submitted[i]===q.correctOrder[i]) matches++; }
  const positionAccuracy = matches / q.correctOrder.length;
  const frac = Math.max(0, 1 - elapsed/limitMs);
  const points = positionAccuracy>0 ? Math.round(positionAccuracy*(500+500*frac)) : 0;
  const correct = positionAccuracy === 1;
  const rec = await sGet('player:'+myPlayerId);
  const data = rec || {id:myPlayerId, nickname:myNickname, score:0, answers:{}};
  data.answers[qId] = {order: submitted, positionAccuracy, correct, points, elapsedMs: elapsed};
  data.score = Object.values(data.answers).reduce((a,b)=>a+(b.points||0),0);
  await sSet('player:'+myPlayerId, data);
  const msgEl = document.getElementById('playerStatusMsg');
  if(msgEl) msgEl.textContent = "Answer locked in — waiting on others...";
};
window.answerChoice = async function(qId, choiceIndex){
  if(submittedForQ === qId) return;
  submittedForQ = qId;
  document.querySelectorAll('.choice-tile').forEach((el,i)=>{
    el.disabled = true;
    if(i===choiceIndex) el.classList.add('selected');
  });
  const st = localState;
  const q = CONFIG.questions.find(x=>x.id===qId);
  const elapsed = Date.now() - (st.questionStartAt || Date.now());
  const limitMs = q.timeLimit*1000;
  const correct = q.acceptableIndexes ? q.acceptableIndexes.includes(choiceIndex) : choiceIndex === q.correctIndex;
  let points = 0;
  if(correct){
    const frac = Math.max(0, 1 - elapsed/limitMs);
    points = Math.round(500 + 500*frac);
  }
  const rec = await sGet('player:'+myPlayerId);
  const data = rec || {id:myPlayerId, nickname:myNickname, score:0, answers:{}};
  data.answers[qId] = {choiceIndex, correct, points, elapsedMs: elapsed};
  data.score = Object.values(data.answers).reduce((a,b)=>a+(b.points||0),0);
  await sSet('player:'+myPlayerId, data);
  const msgEl = document.getElementById('playerStatusMsg');
  if(msgEl) msgEl.textContent = "Answer locked in — waiting on others...";
};
function renderPlayerReveal(q, myData){
  const ans = myData && myData.answers ? myData.answers[q.id] : null;
  let headline, sub, correctText, resultKind;
  if(q.type === 'multi'){
    const correct = ans && ans.correct;
    resultKind = !ans ? 'timeout' : (correct ? 'correct' : 'wrong');
    headline = correct? '✅' : (ans? '❌' : '⏱️');
    sub = correct? ('+'+ans.points+' points') : (ans? 'Not quite' : "Time's up");
    correctText = 'Correct answer: ' + q.correctIndexes.map(i=>q.choices[i]).join(', ');
  } else if(q.type === 'order'){
    const acc = ans ? Math.round(ans.positionAccuracy*100) : 0;
    resultKind = !ans ? 'timeout' : (ans.correct ? 'correct' : (ans.positionAccuracy>0 ? 'partial' : 'wrong'));
    headline = ans && ans.correct ? '✅' : (ans? '🔶' : '⏱️');
    sub = ans ? (ans.correct? ('+'+ans.points+' points') : (acc+'% in the right spot — +'+ans.points+' points')) : "Time's up";
    correctText = 'Correct order: ' + q.correctOrder.map((idx,pos)=>(pos+1)+'. '+q.choices[idx]).join('  ·  ');
  } else {
    const correct = ans && ans.correct;
    resultKind = !ans ? 'timeout' : (correct ? 'correct' : 'wrong');
    headline = correct? '✅' : (ans? '❌' : '⏱️');
    sub = correct? ('+'+ans.points+' points') : (ans? 'Not quite' : "Time's up");
    const correctSet = q.acceptableIndexes || [q.correctIndex];
    correctText = 'Correct answer: ' + correctSet.map(i=>q.choices[i]).join(' or ');
  }
  const funMessage = resultKind==='correct' ? nextCorrectMessage()
    : resultKind==='wrong' ? nextWrongMessage()
    : resultKind==='partial' ? nextPartialMessage() : '';
  render(`
    <div class="screen">
      <div style="font-size:46px;">${headline}</div>
      <h2 style="margin:8px 0 4px;">${sub}</h2>
      ${funMessage ? `<div style="font-weight:600;margin-bottom:8px;">${escapeHtml(funMessage)}</div>` : ''}
      <div class="muted">${escapeHtml(correctText)}</div>
      <div class="card" style="margin-top:22px;">
        <div class="muted eyebrow">Your total score</div>
        <div class="display" style="font-size:40px;font-weight:700;color:var(--amber);">${myData? myData.score : 0}</div>
      </div>
    </div>
  `);
  if(resultKind === 'correct'){ spawnConfetti(); }
}
function spawnConfetti(){
  try{
    const colors = ['var(--amber)','var(--coral)','var(--teal)','var(--violet)','var(--green)'];
    const overlay = document.createElement('div');
    overlay.className = 'confetti-overlay';
    const count = 34;
    for(let i=0;i<count;i++){
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const size = 6 + Math.random()*6;
      piece.style.width = size+'px';
      piece.style.height = (size*0.4)+'px';
      piece.style.left = (Math.random()*100)+'vw';
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      const duration = 1.4 + Math.random()*1.0;
      const delay = Math.random()*0.3;
      piece.style.animationDuration = duration+'s';
      piece.style.animationDelay = delay+'s';
      overlay.appendChild(piece);
    }
    document.body.appendChild(overlay);
    setTimeout(()=>{ overlay.remove(); }, 2600);
  }catch(e){ /* purely decorative, safe to ignore failures */ }
}

function isQrFinderZone(r, c, n){
  const inTL = r < 7 && c < 7;
  const inTR = r < 7 && c >= n-7;
  const inBL = r >= n-7 && c < 7;
  return inTL || inTR || inBL;
}
function renderStyledQR(qr, containerEl){
  const n = qr.getModuleCount();
  const cell = 8;
  const margin = cell * 4;
  const size = n*cell + margin*2;
  let svg = `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${size}" height="${size}" fill="#ffffff"/>`;
  function drawFinder(x0, y0){
    svg += `<rect x="${x0}" y="${y0}" width="${7*cell}" height="${7*cell}" rx="${cell*1.6}" fill="none" stroke="#12141c" stroke-width="${cell}"/>`;
    svg += `<rect x="${x0+cell*2}" y="${y0+cell*2}" width="${3*cell}" height="${3*cell}" rx="${cell*0.9}" fill="#ffb627"/>`;
  }
  drawFinder(margin, margin);
  drawFinder(margin + (n-7)*cell, margin);
  drawFinder(margin, margin + (n-7)*cell);
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      if(isQrFinderZone(r,c,n)) continue;
      if(qr.isDark(r,c)){
        const cx = margin + c*cell + cell/2;
        const cy = margin + r*cell + cell/2;
        svg += `<circle cx="${cx}" cy="${cy}" r="${cell*0.42}" fill="#12141c"/>`;
      }
    }
  }
  // Small centered logo — safe because 'H' error-correction tolerates ~30% obstruction
  const logoSize = size * 0.20;
  const logoX = (size-logoSize)/2, logoY = (size-logoSize)/2;
  svg += `<rect x="${logoX-8}" y="${logoY-8}" width="${logoSize+16}" height="${logoSize+16}" rx="10" fill="#ffffff"/>`;
  svg += `<image href="${LOGO_DATA_URI}" x="${logoX}" y="${logoY}" width="${logoSize}" height="${logoSize}" preserveAspectRatio="xMidYMid meet"/>`;
  svg += `</svg>`;
  containerEl.innerHTML = svg;
}

let cachedVoices = [];
function loadVoices(){
  try{
    if(!window.speechSynthesis) return;
    cachedVoices = window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = function(){
      cachedVoices = window.speechSynthesis.getVoices();
    };
  }catch(e){}
}
loadVoices();
function pickPreferredVoice(){
  if(!cachedVoices || cachedVoices.length === 0){
    try{ cachedVoices = window.speechSynthesis.getVoices(); }catch(e){}
  }
  if(!cachedVoices || cachedVoices.length === 0) return null;
  const femaleHints = ['female','samantha','victoria','zira','susan','karen','moira','tessa','fiona','allison','ava','joanna','salli','kimberly','kendra','ivy','emma','amy','olivia','google us english'];
  const englishVoices = cachedVoices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
  const pool = englishVoices.length ? englishVoices : cachedVoices;
  let match = pool.find(v => femaleHints.some(h => v.name.toLowerCase().includes(h)));
  if(!match) match = pool[0];
  return match;
}
function speakText(text){
  try{
    if(!window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    const voice = pickPreferredVoice();
    if(voice) utter.voice = voice;
    window.speechSynthesis.speak(utter);
  }catch(e){ console.error('speech synthesis failed', e); }
}

  if(st.screen !== 'question' || st.paused) return;
  const q = CONFIG.questions[st.qIndex];
  const limitMs = q.timeLimit*1000;
  const remainingMs = Math.max(0, limitMs - (Date.now() - st.questionStartAt));

  st.pausedRemainingMs = remainingMs;

  await saveGameState(st);

window.resumeQuestionTimer = async function(){
  const st = await sGet(STATE_KEY) || DEFAULT_STATE;
  if(st.screen !== 'question' || !st.paused) return;
  const q = CONFIG.questions[st.qIndex];
  const limitMs = q.timeLimit*1000;
  const remaining = (st.pausedRemainingMs != null) ? st.pausedRemainingMs : limitMs;
  st.questionStartAt = Date.now() - (limitMs - remaining);
  st.paused = false;
  st.pausedRemainingMs = null;
  st.updatedAt = Date.now();
  await saveGameState(st);

      <h2 style="max-width:760px;margin:6px 0 4px;">${escapeMultiline(q.prompt)}</h2>
      ${questionBodyHtml(q)}
      <div class="answered-count" id="answeredCount">${answeredCount} / ${players.length} answered</div>
      <div class="row" style="margin-top:16px;">
        <button class="btn ghost" onclick="speakQuestion()">🔊 Read Aloud</button>
        <button class="btn ghost" onclick="hostForceReveal()">End early &amp; reveal</button>
      </div>
    </div>
    <div class="host-badge">HOST VIEW</div>
  `);
  startRingTicker(q, state, true);
}
window.hostForceReveal = async function(){
  const st = await sGet(STATE_KEY) || DEFAULT_STATE;
  st.screen = 'reveal'; st.updatedAt = Date.now();
  await saveGameState(st);
};
async function renderHostReveal(q){
  const players = await getAllPlayers();
  let bodyHtml = '';
  if(q.type === 'order'){
    let totalAcc = 0, n = 0;
    players.forEach(p=>{ const a = p.answers && p.answers[q.id]; if(a && typeof a.positionAccuracy === 'number'){ totalAcc += a.positionAccuracy; n++; } });
    const avgAcc = n>0 ? Math.round((totalAcc/n)*100) : 0;
    bodyHtml = `
      <div class="order-correct-list">
        ${q.correctOrder.map((idx,pos)=>`<div>${pos+1}. ${escapeHtml(q.choices[idx])}</div>`).join('')}
      </div>
      <div class="muted" style="margin-top:10px;">Average accuracy across players who answered: ${avgAcc}%</div>`;
  } else if(q.type === 'multi'){
    const counts = q.choices.map(()=>0);
    players.forEach(p=>{ const a = p.answers && p.answers[q.id]; if(a && a.choiceIndexes) a.choiceIndexes.forEach(i=>counts[i]=(counts[i]||0)+1); });
    bodyHtml = `<div class="choices count-${q.choices.length}" style="max-width:760px;">
        ${q.choices.map((c,i)=>`
          <button class="choice-tile c${i} ${q.correctIndexes.includes(i)?'correct-reveal':'wrong-reveal'}" disabled>
            ${SHAPES[i]}<span>${escapeHtml(c)} — ${counts[i]||0}</span>
          </button>`).join('')}
      </div>`;
  } else {
    const counts = q.choices.map(()=>0);
    players.forEach(p=>{ const a = p.answers && p.answers[q.id]; if(a) counts[a.choiceIndex] = (counts[a.choiceIndex]||0)+1; });
    const correctSet = q.acceptableIndexes || [q.correctIndex];
    bodyHtml = `<div class="choices count-${q.choices.length}" style="max-width:760px;">
        ${q.choices.map((c,i)=>`
          <button class="choice-tile c${i} ${correctSet.includes(i)?'correct-reveal':'wrong-reveal'}" disabled>
            ${SHAPES[i]}<span>${escapeHtml(c)} — ${counts[i]||0}</span>
          </button>`).join('')}
      </div>`;
  }
  render(`
    <div class="screen">
      <div class="qcounter">Question ${q.id} of ${CONFIG.questions.length} — Reveal</div>
      <h2 style="max-width:760px;">${escapeMultiline(q.prompt)}</h2>
      ${bodyHtml}
      <div class="row" style="margin-top:26px;">
        <button class="btn secondary" onclick="hostShowAnswerModal()">Show Answer</button>
        <button class="btn secondary" onclick="hostShowLeaderboard()">Show Leaderboard</button>
        ${q.id < CONFIG.questions.length ? `<button class="btn" onclick="hostGoToQuestion(${CONFIG.questions.findIndex(x=>x.id===q.id)+1})">Next Question</button>` : `<button class="btn" onclick="hostShowFinal()">Show Final Results</button>`}
      </div>
    </div>
    <div class="host-badge">HOST VIEW</div>
  `);
}
window.hostShowLeaderboard = async function(){
  const st = await sGet(STATE_KEY) || DEFAULT_STATE;
  st.screen = 'leaderboard'; st.showAnswer = false; st.updatedAt = Date.now();
  await saveGameState(st);
};
window.hostShowFinal = async function(){
  const st = await sGet(STATE_KEY) || DEFAULT_STATE;
  st.screen = 'final'; st.showAnswer = false; st.updatedAt = Date.now();
  await saveGameState(st);
};
async function renderHostLeaderboard(state){
  removeAnswerModalDom();
  const ranked = await getRankedPlayers();
  const isLast = state.qIndex >= CONFIG.questions.length - 1;
  render(`
    <div class="screen">
      <div class="eyebrow">Standings</div>
      <h1 style="margin:0 0 20px;">Current Leaderboard</h1>
      <div class="stack" style="width:100%;max-width:600px;">
        ${ranked.slice(0,8).map((p,i)=>lbRowHtml(p,i)).join('') || '<div class="muted">No players yet</div>'}
      </div>
      <div class="row" style="margin-top:26px;">
        ${!isLast ? `<button class="btn" onclick="hostGoToQuestion(${state.qIndex+1})">Next Question</button>` : `<button class="btn" onclick="hostShowFinal()">Show Final Results</button>`}
      </div>
    </div>
    <div class="host-badge">HOST VIEW</div>
  `);
}
async function renderHostFinal(){
  removeAnswerModalDom();
  const ranked = await getRankedPlayers();
  const top3 = ranked.slice(0,3);
  render(`
    <div class="screen">
      <img class="brand-logo md" src="${LOGO_DATA_URI}" alt="logo">
      <div class="eyebrow">Game Over</div>
      <h1 style="margin:0 0 6px;">Final Results</h1>
      <div class="podium">
        ${top3[1] ? `<div class="podium-col"><div>${escapeHtml(top3[1].nickname)}</div><div class="podium-bar p2">${top3[1].score}</div></div>` : ''}
        ${top3[0] ? `<div class="podium-col"><div>🏆 ${escapeHtml(top3[0].nickname)}</div><div class="podium-bar p1">${top3[0].score}</div></div>` : '<div class="muted">No players</div>'}
        ${top3[2] ? `<div class="podium-col"><div>${escapeHtml(top3[2].nickname)}</div><div class="podium-bar p3">${top3[2].score}</div></div>` : ''}
      </div>
      <div class="stack" style="width:100%;max-width:600px;margin-top:10px;">
        ${ranked.slice(3,10).map((p,i)=>lbRowHtml(p,i+3)).join('')}
      </div>
      <button class="btn ghost" style="margin-top:26px;" onclick="hostResetGame().then(renderHostLobby)">Start a new session</button>
    </div>
    <div class="host-badge">HOST VIEW</div>
  `);
}
async function renderHostClosed(){
  removeAnswerModalDom();
  const ranked = await getRankedPlayers();
  render(`
    <div class="screen">
      <img class="brand-logo md" src="${LOGO_DATA_URI}" alt="logo">
      <div class="eyebrow">Session Closed</div>
      <h1 style="margin:0 0 18px;">Thanks for playing!</h1>
      <div class="stack" style="width:100%;max-width:600px;">
        ${ranked.slice(0,8).map((p,i)=>lbRowHtml(p,i)).join('') || '<div class="muted">No players</div>'}
      </div>
      <button class="btn ghost" style="margin-top:26px;" onclick="hostResetGame().then(renderHostLobby)">Start a new session</button>
    </div>
    <div class="host-badge">HOST VIEW</div>
  `);
}

// ---------- shared helpers ----------
function lbRowHtml(p, i){
  const rankLabel = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
  return `<div class="lb-row ${i===0?'top1':''}">
    <div class="lb-rank">${rankLabel}</div>
    <div class="avatar" style="background:${nickColor(p.nickname)};">${initials(p.nickname)}</div>
    <div class="lb-name">${escapeHtml(p.nickname)}</div>
    <div class="lb-score">${p.score}</div>
  </div>`;
}
async function getAllPlayers(){
  const keys = await sList('player:');
  const players = [];
  for(const k of keys){
    const v = await sGet(k);
    if(v) players.push(v);
  }
  return players;
}
async function getRankedPlayers(){
  const players = await getAllPlayers();
  return players.sort((a,b)=>(b.score||0)-(a.score||0));
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }
function escapeMultiline(str){ return escapeHtml(str).replace(/\n/g, '<br>'); }

// ---------- ring ticker (countdown) ----------
function startRingTicker(q, state, isHost){
  clearInterval(tickTimer);
  const circumference = 2*Math.PI*50;
  const ringFg = document.getElementById('ringFg');
  const ringNum = document.getElementById('ringNum');
  if(ringFg){ ringFg.style.strokeDasharray = circumference; }
  function tick(){
    const limitMs = q.timeLimit*1000;
    let remainingMs;
    if(state.paused){
      remainingMs = (state.pausedRemainingMs != null) ? state.pausedRemainingMs : limitMs;
    } else {
      const startAt = state.questionStartAt || Date.now();
      remainingMs = Math.max(0, limitMs - (Date.now()-startAt));
    }
    const frac = Math.max(0, remainingMs/limitMs);
    const secs = Math.ceil(remainingMs/1000);
    if(ringFg){
      ringFg.style.strokeDashoffset = circumference*(1-frac);
      ringFg.style.stroke = frac < 0.25 ? 'var(--coral)' : 'var(--amber)';
    }
    if(ringNum) ringNum.textContent = state.paused ? (secs + ' ⏸') : secs;
    if(state.paused){ clearInterval(tickTimer); return; }
    if(remainingMs <= 0){
      clearInterval(tickTimer);
      if(isHost){ window.hostForceReveal(); }
    }
  }
  tick();
  if(!state.paused) tickTimer = setInterval(tick, 200);
}

// ---------- polling loop: reacts to shared game:state ----------
function startPolling(){
  clearInterval(pollTimer);
  pollLoop();
  pollTimer = setInterval(pollLoop, 1500);
}
let lastRenderedKey = null;
let lastVideoPlayToken = null;
function syncVideoPlayTrigger(st){
  if(myRole !== 'host') return;
  const token = st.videoPlayToken || 0;
  if(lastVideoPlayToken === null){ lastVideoPlayToken = token; return; } // don't fire on first load
  if(token !== lastVideoPlayToken){
    lastVideoPlayToken = token;
    if(currentVideoController && currentVideoController.play){ currentVideoController.play(); }
  }
}
async function pollLoop(){
  const st = await sGet(STATE_KEY);
  if(!st) return;
  localState = st;
  syncAnswerModalDisplay(st);
  syncVideoPlayTrigger(st);

  if(myRole === 'host'){
    await renderForHost(st);
  } else if(myRole === 'player'){
    await renderForPlayer(st);
  } else if(myRole === 'console'){
    await renderForConsole(st);
  }
}
let lastConsoleKey = null;
async function renderForConsole(st){
  const key = st.screen+':'+st.qIndex+':'+st.paused+':'+st.pausedRemainingMs+':'+consoleLayoutMode;
  if(lastConsoleKey !== key){
    lastConsoleKey = key;
    await renderConsole(st);
  } else {
    await refreshConsoleRosterOnly();
  }
}
async function refreshConsoleRosterOnly(){
  const players = await getRankedPlayers();
  const wrap = document.querySelector('.console-roster');
  if(wrap){
    wrap.innerHTML = players.map(p=>`
      <div class="console-player-row">
        <span class="avatar" style="background:${nickColor(p.nickname)};">${initials(p.nickname)}</span>
        <span class="lb-name">${escapeHtml(p.nickname)}</span>
        <span class="lb-score">${p.score||0}</span>
        <button class="console-remove-btn" title="Remove player" onclick="consoleRemovePlayer('${p.id}')">✕</button>
      </div>`).join('') || '<div class="muted">No players have joined yet</div>';
  }
  const heading = document.querySelector('.console-wrap h3');
  if(heading) heading.textContent = `Players (${players.length})`;
}
async function renderForHost(st){
  const key = st.screen+':'+st.qIndex+':'+st.questionStartAt+':'+st.paused+':'+st.pausedRemainingMs;
  // lobby needs continuous refresh of player list; everything else only on screen change
  if(st.screen === 'lobby'){
    const players = await getAllPlayers();
    const wrap = document.getElementById('playerWrapHost');
    if(wrap){
      wrap.innerHTML = players.map(p=>`<div class="player-chip"><span class="avatar" style="background:${nickColor(p.nickname)};">${initials(p.nickname)}</span>${escapeHtml(p.nickname)}</div>`).join('') || '<div class="muted">Waiting for players to join...</div>';
    }
    return;
  }
  if(st.screen === 'question'){
    // re-render periodically to update answered count, but keep same tick loop running
    if(lastRenderedKey !== key){ lastRenderedKey = key; await renderHostQuestion(CONFIG.questions[st.qIndex], st); }
    else {
      const players = await getAllPlayers();
      const q = CONFIG.questions[st.qIndex];
      const answeredCount = players.filter(p => p.answers && p.answers[q.id]).length;
      const el = document.getElementById('answeredCount');
      if(el) el.textContent = `${answeredCount} / ${players.length} answered`;
    }
    return;
  }
  if(lastRenderedKey === key) return;
  lastRenderedKey = key;
  if(st.screen === 'intro') renderHostIntro();
  else if(st.screen === 'video') renderHostVideo(CONFIG.questions[st.qIndex]);
  else if(st.screen === 'reveal') await renderHostReveal(CONFIG.questions[st.qIndex]);
  else if(st.screen === 'leaderboard') await renderHostLeaderboard(st);
  else if(st.screen === 'final') await renderHostFinal();
  else if(st.screen === 'closed') renderHostClosed();
}
async function renderForPlayer(st){
  const key = st.screen+':'+st.qIndex+':'+st.questionStartAt+':'+st.paused+':'+st.pausedRemainingMs;
  if(st.screen === 'question' && lastRenderedKey === key) return; // ticker already running
  if(lastRenderedKey === key && st.screen !== 'question') return;
  lastRenderedKey = key;
  submittedForQ = null;

  if(st.screen === 'lobby'){ renderPlayerWaiting(undefined, true); }
  else if(st.screen === 'intro'){ renderPlayerWaiting("Get ready — the game is starting!", false); }
  else if(st.screen === 'video'){ renderPlayerVideoWait(CONFIG.questions[st.qIndex]); }
  else if(st.screen === 'question'){
    const rec = await sGet('player:'+myPlayerId);
    if(rec && rec.answers && rec.answers[CONFIG.questions[st.qIndex].id]) submittedForQ = CONFIG.questions[st.qIndex].id;
    renderPlayerQuestion(CONFIG.questions[st.qIndex], st);
  }
  else if(st.screen === 'reveal'){
    const rec = await sGet('player:'+myPlayerId);
    renderPlayerReveal(CONFIG.questions[st.qIndex], rec);
  }
  else if(st.screen === 'leaderboard'){
    const ranked = await getRankedPlayers();
    renderPlayerLeaderboard(ranked);
  }
  else if(st.screen === 'final'){
    const ranked = await getRankedPlayers();
    renderPlayerFinal(ranked);
  }
  else if(st.screen === 'closed'){
    const ranked = await getRankedPlayers();
    renderPlayerClosed(ranked);
  }
}

boot();
</script>
